name: CI

on:
  push:
    branches:
      - main
      - feat-*
      - fix-*
      - refactor-*
      - codex/*
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Run lint
        run: uv run ruff check .

      - name: Check format
        run: uv run ruff format --check .

      - name: Check docstring coverage
        run: |
          uv run interrogate . \
            --quiet \
            --fail-under=80 \
            --exclude tests \
            --exclude scripts \
            --exclude dist \
            --exclude tmp \
            --exclude agvv/__init__.py \
            --exclude agvv/cli.py \
            --exclude agvv/orchestration/__init__.py \
            --exclude agvv/runtime/__init__.py \
            --exclude agvv/shared/__init__.py
          uv run interrogate agvv/runtime agvv/orchestration agvv/shared \
            --quiet \
            --fail-under=100 \
            --exclude agvv/orchestration/__init__.py \
            --exclude agvv/runtime/__init__.py \
            --exclude agvv/shared/__init__.py

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Run tests
        run: uv run pytest --cov=agvv --cov-branch --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: coverage-xml
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - lint
      - test

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup uv
        uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081  # v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Build package
        run: uv build

      - name: Upload dist artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: dist
          path: dist/
